<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>GapStrike — Master Your Mistakes</title>

    <!-- Fonts (same as example) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Iconify -->
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>

    <!-- GSAP & ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        body: '#0a0a0f',
                        surface: '#111118',
                        card: '#16161f',
                        muted: '#5a5a6e',
                        secondary: '#9898a6',
                        accent: '#7c3aed',
                    },
                    animation: {
                        'spin-slow': 'spin 8s linear infinite',
                    },
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0f;
            color: #ffffff;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Text outline — purple stroke variant */
        .text-outline-purple {
            -webkit-text-stroke: 1.5px #7c3aed;
            color: transparent;
            transition: all 0.5s ease;
        }

        /* Beam button (from example) */
        .btn-beam {
            position: relative;
            z-index: 10;
            overflow: hidden;
        }
        .btn-beam::before {
            content: "";
            position: absolute;
            inset: -2px;
            z-index: -1;
            background: conic-gradient(from 90deg at 50% 50%, #7c3aed 0%, #0a0a0f 50%, #7c3aed 100%);
            animation: spin 4s linear infinite;
            border-radius: inherit;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .btn-beam:hover::before {
            opacity: 1;
        }

        /* Noise overlay (from example, lower opacity for dark) */
        .noise-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0.02;
            pointer-events: none;
            z-index: 9999;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Reveal animations (from example) */
        .reveal-up {
            opacity: 0;
            transform: translateY(30px);
            filter: blur(15px);
            will-change: transform, opacity, filter;
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal-up.active {
            opacity: 1;
            transform: translateY(0);
            filter: blur(0);
        }
        .reveal-zoom {
            opacity: 0;
            transform: scale(0.95);
            filter: blur(10px);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal-zoom.active {
            opacity: 1;
            transform: scale(1);
            filter: blur(0);
        }

        /* Hero scroll container */
        .hero-scrub-container {
            height: 200vh;
        }

        /* Scroll hint line animation */
        @keyframes scroll-line {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .animate-scroll-line {
            animation: scroll-line 1.5s cubic-bezier(0.77, 0, 0.175, 1) infinite;
        }

        /* Custom scrollbar (dark) */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0f; }
        ::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #3a3a4a; }
    </style>
</head>

<body class="antialiased min-h-screen relative selection:bg-accent selection:text-white">
    <div class="noise-overlay"></div>

    <!-- NAVBAR -->
    <header class="fixed w-full z-50 top-0 transition-all duration-300" id="navbar">
        <div class="absolute inset-0 bg-black/70 backdrop-blur-md border-b border-white/5"></div>
        <div class="max-w-[1440px] mx-auto px-6 py-4 relative flex justify-between items-center">
            <!-- Logo -->
            <div class="flex items-center gap-2.5 group cursor-pointer">
                <div class="w-2.5 h-2.5 bg-accent rounded-full group-hover:shadow-[0_0_12px_rgba(124,58,237,0.6)] transition-shadow duration-300"></div>
                <span class="font-display font-semibold tracking-tight text-lg text-white">GapStrike</span>
            </div>

            <!-- Nav Links -->
            <nav class="hidden md:flex items-center gap-8 text-xs font-mono uppercase tracking-widest text-muted">
                <a href="#method" class="hover:text-white transition-colors">Method</a>
                <a href="#features" class="hover:text-white transition-colors">Features</a>
                <a href="#pricing" class="hover:text-white transition-colors">Pricing</a>
            </nav>

            <!-- Actions -->
            <div class="flex items-center gap-4">
                <a href="#" class="text-sm text-secondary hover:text-white transition-colors hidden md:block">Login</a>
                <div class="hidden md:block w-px h-4 bg-white/10"></div>
                <button class="px-5 py-2 bg-accent text-white text-sm font-medium rounded-full hover:bg-accent/90 hover:shadow-[0_0_20px_rgba(124,58,237,0.4)] transition-all">
                    Get Started
                </button>
            </div>
        </div>
    </header>

    <!-- HERO SECTION -->
    <main class="hero-scrub-container relative bg-body">
        <div class="sticky top-0 h-screen w-full overflow-hidden">

            <!-- Neural Lattice Canvas (background) -->
            <div class="absolute inset-0 z-0">
                <canvas id="neural-canvas" class="w-full h-full"></canvas>
            </div>

            <!-- Text Layer -->
            <div class="relative z-10 w-full h-full max-w-[1440px] mx-auto grid grid-cols-1 md:grid-cols-12 pointer-events-none">

                <!-- Headline Group -->
                <div class="col-span-1 md:col-span-10 lg:col-span-7 h-full flex flex-col justify-center px-6 md:pl-24 text-left pointer-events-auto">
                    <!-- Badge -->
                    <div class="inline-flex items-center gap-3 mb-4 reveal-up">
                        <span class="w-2 h-2 bg-accent rounded-full"></span>
                        <span class="text-xs font-mono uppercase tracking-[0.2em] text-muted">Question-Indexed Mastery</span>
                    </div>

                    <!-- Headline -->
                    <h1 class="font-display text-5xl md:text-7xl lg:text-[5.5rem] font-bold tracking-tighter leading-[0.85] mb-5 -ml-1">
                        <div class="reveal-up block text-white">Master Your</div>
                        <div class="reveal-up block text-outline-purple">Mistakes.</div>
                    </h1>

                    <!-- Subheadline -->
                    <p class="text-lg md:text-xl text-secondary max-w-lg leading-relaxed reveal-up mb-8 font-light">
                        GapStrike transforms every incorrect answer into structured, permanent knowledge.
                    </p>

                    <!-- CTAs -->
                    <div class="flex flex-wrap gap-4 reveal-up">
                        <button class="group relative px-8 py-4 bg-accent text-white rounded-full overflow-hidden shadow-lg hover:shadow-[0_0_30px_rgba(124,58,237,0.4)] transition-all hover:-translate-y-1">
                            <span class="relative z-10 text-sm font-medium tracking-wide">Get Started</span>
                        </button>
                        <button class="group px-8 py-4 bg-white/5 text-white rounded-full border border-white/10 hover:border-white/20 hover:bg-white/10 transition-all hover:-translate-y-1 flex items-center gap-2">
                            <span class="text-sm font-medium tracking-wide">See How It Works</span>
                            <iconify-icon icon="solar:arrow-down-linear" class="group-hover:translate-y-0.5 transition-transform"></iconify-icon>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Scroll Hint -->
            <div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2 z-20 opacity-60 pointer-events-none">
                <span class="text-[10px] font-mono uppercase tracking-widest text-muted">Scroll</span>
                <div class="w-px h-8 bg-muted overflow-hidden relative">
                    <div class="absolute top-0 left-0 w-full h-full bg-accent animate-scroll-line"></div>
                </div>
            </div>

            <!-- Gradient fade to next section -->
            <div class="absolute bottom-0 left-0 w-full h-32 bg-gradient-to-t from-surface to-transparent pointer-events-none z-10"></div>
        </div>
    </main>

    <script>
        // JS will be added in subsequent tasks
    </script>
</body>
</html>
