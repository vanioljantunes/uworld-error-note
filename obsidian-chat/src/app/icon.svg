<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <title>GapStrike</title>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0d0618"/>
  <defs>
    <linearGradient id="boltGrad" x1="0.4" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#d8b4fe"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <!-- Soft glow behind bolt -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Gap lines (the "gap" the bolt strikes through) -->
  <line x1="2"  y1="17" x2="6"  y2="17" stroke="#4c1d95" stroke-width="2" stroke-linecap="round"/>
  <line x1="25" y1="17" x2="30" y2="17" stroke="#4c1d95" stroke-width="2" stroke-linecap="round"/>
  <!-- Lightning bolt: classic 6-point Z-shape -->
  <polygon
    points="18,2 7,17 14,17 12,30 23,17 16,17"
    fill="url(#boltGrad)"
    filter="url(#glow)"
  />
</svg>
